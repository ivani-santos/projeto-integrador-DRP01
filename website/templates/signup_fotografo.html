{% extends "base.html" %} {% block title %}Cadastro Fotografo - FOTECTA: Como conectar fotógrafos com novos clientes{% endblock %}
{%block content%}

<form method="POST">

    <h3 align="center">NOVO CADASTRO DO PROFISSIONAL</h3>
    <div class="form-group">
        <label for="email">Endereço de Email</label>
        <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="Digite seu Email"
        />

    </div>
    <div class="form-group">
        <label for="firstName">Digite seu Nome</label>
        <input
            type="text"
            class="form-control"
            id="firstName"
            name="firstName"
            placeholder="José"
        />

    </div>
    <div class="form-group">
        <label for="lastName">Digite seu Sobrenome</label>
        <input
            type="text"
            class="form-control"
            id="lastName"
            name="lastName"
            placeholder="Da Silva Pereira"
        />
    </div>
    <div class="form-group">
        <label for="password1">Crie uma senha</label>
        <input
            type="password"
            class="form-control"
            id="password1"
            name="password1"
            placeholder="Crie uma senha"
        />
    </div>
    <div class="form-group">
        <label for="password2">Confirme sua senha</label>
        <input
            type="password"
            class="form-control"
            id="password2"
            name="password2"
            placeholder="Confirme sua senha"
        />
    </div>
    <br/>
    <button type="submit" class="btn btn-primary">Criar Conta para Profissional</button>
</form>
{%endblock%}
