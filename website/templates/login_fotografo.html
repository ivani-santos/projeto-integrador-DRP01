<!--login fotografo-->
{% extends "base.html" %}
<!--para que bootstrap, javascript etc funcione nas páginas -->
{% block title %}Login Fotografo - FOTECTA: Como conectar fotógrafos com novos clientes{% endblock %}
{%block content%}

<form method="GET">
    <!--get pega no bd-->
    <!--falta conectar tudo ao banco de dados-->
    <h3 align="center">lOGIN DO PROFISSIONAL</h3>
    <div class="form-group">
        <!--campo para inserir email-->
        <label for="email">Endereço de Email</label>
        <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="Digite seu Email"
        />
    </div>
    <div class="form-group">
        <!--campo para inserir senha-->
        <label for="password1">Digite sua senha</label>
        <input
            type="password"
            class="form-control"
            id="password1"
            name="password1"
            placeholder="Digite sua senha"
        />
    </div>
    <br/>
    <!--botão confirmar-->
    <button type="submit" class="btn btn-primary">Entrar como Profissional</button>
</form>
{%endblock%}
